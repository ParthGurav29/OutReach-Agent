services:
  # Backend Service (FastAPI)
  - type: web
    name: outreach-agent-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker backend.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: NOVA_PRO_MODEL_ID
        value: amazon.nova-pro-v1:0
      - key: NOVA_MICRO_MODEL_ID
        value: amazon.nova-micro-v1:0
      - key: TAVILY_API_KEY_1
        sync: false
      - key: PROXYCURL_API_KEY
        sync: false

  # Frontend Service (Vite/React)
  - type: web
    name: outreach-agent-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://outreach-agent-backend.onrender.com # Change this after backend is up
